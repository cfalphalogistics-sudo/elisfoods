<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const loadingPhrases = [
                "Preparing your kitchen...",
                "Sourcing fresh ingredients...",
                "Seasoning the grill...",
                "Ready to serve!"
            ];
            const loadingText = document.getElementById('loading-text');
            let index = 0;

            const updateText = () => {
                index = (index + 1) % loadingPhrases.length;
                loadingText.style.opacity = '0';
                setTimeout(() => {
                    loadingText.innerText = loadingPhrases[index];
                    loadingText.style.opacity = '1';
                }, 300);
            };

            const interval = setInterval(updateText, 1500);

            // Optional: Auto-redirect simulation for a splash screen
            /*
            setTimeout(() => {

                console.log("Redirecting to Eli's Food Menu...");

        });
