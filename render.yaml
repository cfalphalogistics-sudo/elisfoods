# Render blueprint for the Eli's Food Laravel API.
# This provisions a free managed PostgreSQL database and a Docker web service.
databases:
  - name: elis-food-db
    databaseName: elis_food
    user: elis_food
    plan: free

services:
  - type: web
    name: elis-food-api
    runtime: docker
    rootDir: backend
    repo: https://github.com/cfalphalogistics-sudo/elisfoods.git
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false # set manually in the Render dashboard — never commit this value
      - key: APP_URL
        value: https://elis-food-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: elis-food-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: elis-food-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: elis-food-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: elis-food-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: elis-food-db
          property: password
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: FRONTEND_URL
        value: https://elis-food-gh.netlify.app
