# DEPRECATED: this blueprint has been moved to the repo root.
# Use /render.yaml in the elisfood repository instead.
# Render Blueprints must live at the repository root to be detected.

  - name: elis-food-db
    databaseName: elis_food
    user: elis_food
    plan: free

services:
  - type: web
    name: elis-food-api
    runtime: docker
    repo: https://github.com/joshbudu/elisfood.git
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://elis-food-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: elis-food-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: elis-food-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: elis-food-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: elis-food-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: elis-food-db
          property: password
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: BCRYPT_ROUNDS
        value: "12"
      - key: FRONTEND_URL
        value: https://elis-food-gh.netlify.app
