# fly.toml app configuration file generated for elis-food-api on 2026-07-21T01:35:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'elis-food-api'
primary_region = 'iad'
console_command = 'php /var/www/html/artisan tinker'

[build]
  [build.args]
    NODE_VERSION = '18'
    PHP_VERSION = '8.3'

[env]
  APP_ENV = 'production'
  APP_URL = 'https://elis-food-api.fly.dev'
  BCRYPT_ROUNDS = '12'
  DB_CONNECTION = 'sqlite'
  DB_DATABASE = '/var/www/html/database/storage/database.sqlite'
  LOG_CHANNEL = 'stderr'
  LOG_LEVEL = 'info'
  LOG_STDERR_FORMATTER = 'Monolog\Formatter\JsonFormatter'
  SESSION_DRIVER = 'cookie'
  SESSION_SECURE_COOKIE = 'true'

[[mounts]]
  source = 'elis_food_sqlite'
  destination = '/var/www/html/database/storage'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
